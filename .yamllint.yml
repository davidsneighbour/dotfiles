---
# https://yamllint.readthedocs.io/en/stable/configuration.html
yaml-files:
  - '*.yaml'
  - '*.yml'
  - '.yamllint'

ignore:
  # Downloaded Font Awesome metadata is vendored data, not repository-authored config.
  - configs/fonts/System/fontawesome/metadata/
  # Downloaded Vale style packs are vendored; local DNB, AI, and config styles stay linted.
  - configs/system/vale/styles/alex/
  - configs/system/vale/styles/Google/
  - configs/system/vale/styles/Joblint/
  - configs/system/vale/styles/Microsoft/
  - configs/system/vale/styles/proselint/
  - configs/system/vale/styles/Readability/
  - configs/system/vale/styles/write-good/
  - configs/system/vale/styles/.vale-config/styles/alex/
  - configs/system/vale/styles/.vale-config/styles/Google/
  - configs/system/vale/styles/.vale-config/styles/proselint/
  - configs/system/vale/styles/.vale-config/styles/Readability/
  - configs/system/vale/styles/.vale-config/styles/write-good/
  - node_modules
  - modules

rules:
  # anchors: enable
  braces: enable
  brackets: enable
  colons: enable
  commas: enable
  comments:
    level: warning
  comments-indentation:
    level: warning
  document-end: disable
  document-start:
    level: warning
  empty-lines: enable
  empty-values: disable
  float-values: disable
  hyphens: enable
  indentation:
    spaces: consistent
    indent-sequences: consistent
    check-multi-line-strings: false
  key-duplicates: enable
  key-ordering: disable
  line-length: false
  new-line-at-end-of-file: enable
  new-lines: enable
  octal-values: disable
  quoted-strings: disable
  trailing-spaces: enable
  truthy:
    level: warning
