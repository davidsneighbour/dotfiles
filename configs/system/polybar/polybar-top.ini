include-directory = configs

[bar/top]
background = ${colours.background}
foreground = ${colours.foreground}

font-0 = "${fonts.text}"
font-1 = "${fonts.icons-lucide}"
font-2 = "${fonts.text-condensed}"
font-3 = "${fonts.icons-nerd}"
font-4 = "${fonts.icons-brands}"

height = 30
width = 100%
line-size = 1
enable-ipc = false

wm-name = polybar-top

modules-left = powermenu msgvault issues github
modules-center = date
modules-right = telegram signal tray

spacing = 0
module-margin = 0
