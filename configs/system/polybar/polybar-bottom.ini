include-directory = configs

[bar/bottom]
bottom = true
background = ${colours.background}
foreground = ${colours.foreground}

font-0 = "${fonts.text}"
font-1 = "${fonts.icons-lucide}"
font-2 = "${fonts.text-condensed}"
font-3 = "${fonts.icons-nerd}"
font-4 = "${fonts.icons-brands}"

height = 25
width = 100%
line-size = 4
line-color = ${colours.comment}
dim-value = 1.0
fixed-center = true
wm-name = polybar-bottom

modules-left = rofi ewmh
modules-center = title
modules-right = xkeyboard pulseaudio

scroll-up = "#i3.prev"
scroll-down = "#i3.next"
cursor-click = pointer
cursor-scroll = ns-resize

; click-left = 
; click-middle = 
; click-right =
; scroll-up =
; scroll-down =
; double-click-left =
; double-click-middle =
; double-click-right =

; Set a DPI values used when rendering text
; This only affects scalable fonts
; Set this to 0 to let polybar calculate the dpi from the screen size.
; dpi = 
dpi-x = 96
dpi-y = 96
enable-ipc = false
