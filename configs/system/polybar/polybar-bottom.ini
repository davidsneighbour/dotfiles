include-directory = configs

[bar/bottom]
background = ${colours.background}
foreground = ${colours.foreground}

font-0 = "Verb Light:antialias=false:pixelsize=12;1"
# file:///home/patrick/.fonts/Lucide/unicode.html
font-1 = "lucide:pixelsize=12;2"
font-2 = "VerbExCond Light:antialias=false:pixelsize=12;1"
# https://www.nerdfonts.com/cheat-sheet
font-3 = "Symbols Nerd Font Mono:pixelsize=12;2"

height = 35
width = 100%
line-size = 1
# enable-ipc = true

bottom = true
wm-name = polybar-bottom

# let i3 windows overlay the bar
#override-redirect = true
#wm-restack = i3

; modules-left = i3
modules-left = rofi ewmh
modules-center = title
modules-right = xkeyboard pulseaudio

scroll-up = "#i3.prev"
scroll-down = "#i3.next"

cursor-click = pointer
cursor-scroll = ns-resize
