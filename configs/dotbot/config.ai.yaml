---
################################################################################
# Setup configuration for Dotbot
#
# @see https://github.com/anishathalye/dotbot for more info
################################################################################
# AI tooling bootstrap (Ollama and related activation/install commands).

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~"]

- link:
    ~/.agents:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/agents
    ~/.claude.json:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/claude.json
    ~/.claude:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/claude
    ~/.codex:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/codex
    ~/.copilot:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/copilot
    ~/.gemini:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/gemini
    ~/.hermes:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/hermes
    ~/.ollama:
      path: ${HOME}/github.com/davidsneighbour/dotfiles-protected/ai-configs/ollama
