---
################################################################################
# Setup configuration for Dotbot
#
# @see https://github.com/anishathalye/dotbot for more info
################################################################################
# AI tooling bootstrap (Ollama and related activation/install commands).

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~"]

- link:
    ~/.agents:
      path: ${HOME}/github.com/davidsneighbour/ai/configs/agents
    ~/.claude.json:
      path: ${HOME}/github.com/davidsneighbour/ai/configs/claude.json
    ~/.claude:
      path: ${HOME}/github.com/davidsneighbour/ai/configs/claude
    ~/.codex:
      path: ${HOME}/github.com/davidsneighbour/ai/configs/codex
    ~/.copilot:
      path: ${HOME}/github.com/davidsneighbour/ai/configs/copilot   

- shell:
    - curl -fsSL "https://ollama.com/install.sh" | bash
    - curl -fsSL "https://animations.dev/api/activate-design-engineering?email=pkollitsch%40gmail.com" | bash
    - curl -fsSL "https://animations.dev/api/activate?email=pkollitsch@gmail.com" | bash
