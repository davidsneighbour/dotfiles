---
################################################################################
# Setup configuration for Dotbot
#
# @see https://github.com/anishathalye/dotbot for more info
################################################################################
# Main workstation dotfiles setup (links, tools, cronjobs, and host-specific configs).

- plugins:
    - modules/dotbot-plugins/crontab-dotbot/

- crontab:
    - cron: "*/2 * * * *"
      comment: load emails every 2 minutes
      command: ${HOME}/.dotfiles/bashrc/helpers/msgvault/sync.sh

    - cron: "30 3 * * *"
      comment: "daily msgvault backup"
      command: LOG_FILE="${HOME}/.logs/msgvault/backup-$(date +\%Y\%m\%d-\%H\%M).log"; mkdir -p "${HOME}/.logs/msgvault" && DNB_MSGVAULT_BACKUP_LOG_FILE="${LOG_FILE}" DNB_MSGVAULT_LOG_TO_STDOUT=0 ${HOME}/.dotfiles/bashrc/helpers/msgvault/backup --source "${HOME}/.msgvault" >> "${LOG_FILE}" 2>&1

    - cron: "15 15 * * *"
      comment: "daily docker container backup"
      command: ${HOME}/.dotfiles/bashrc/cronjobs/docker-backup.sh --apply --docker-path ${HOME}/.dotfiles/containers/locutus --backup-path /mnt/storage/Backup/Docker/Locutus --verbose >> "${HOME}/.logs/cron/docker-backup-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1

    - cron: "20 15 * * 0"
      comment: "weekly docker container backup to keep"
      command: ${HOME}/.dotfiles/bashrc/cronjobs/docker-backup.sh --keep --apply --docker-path ${HOME}/.dotfiles/containers/locutus --backup-path /mnt/storage/Backup/Docker/Locutus --keep-count 10 --verbose >> "${HOME}/.logs/cron/docker-backup-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1

    - cron: 0 0 * * *
      command: ${HOME}/github.com/davidsneighbour/dotfiles/bashrc/helpers/update-npm.sh >> "$HOME/.logs/cron/job-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
    - cron: 30 */4 * * *
      command: ${HOME}/github.com/davidsneighbour/dotfiles/bashrc/cronjobs/filespace-discord.sh >> "$HOME/.logs/cron/job-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
    - cron: 0 6,12,18 * * *
      command: ${HOME}/github.com/davidsneighbour/lighthousing/cronjob.sh >> "$HOME/.logs/cron/job-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
    - cron: "@reboot"
      command: ${HOME}/github.com/davidsneighbour/lighthousing/cronjob.sh >> "$HOME/.logs/cron/job-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
    - cron: 0 * * * *
      command: ${HOME}/.dotfiles/bashrc/helpers/cronjobs/synch_downloads.sh
    - cron: 5 */6 * * *
      command: ${HOME}/.dotfiles/bashrc/cronjobs/git_updates.sh --config ${HOME}/.dotfiles/configs/system/repository_updates.toml --verbose >> "$HOME/.logs/cron/repo-update-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1

    - cron: "0 * * * *"
      comment: "cleanup old logs every hour"
      command: ${HOME}/.dotfiles/bashrc/helpers/logs/cleanup.ts  --config ${HOME}/.dotfiles/bashrc/helpers/logs/config.toml  --verbose >> "$HOME/.logs/cron/cleanup-logs-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
    - cron: "50 7,15,23 * * *"
      comment: "create daily repo log in obsidian for previous day"
      command: ${HOME}/.dotfiles/bashrc/helpers/daily-reports/commit-report-to-dailynote.sh --usernames "$HOME/github.com" --date "$(date -d 'yesterday' +\%F)"  >> "$HOME/.logs/cron/daily-report-cron-$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1

    - cron: "@reboot"
      comment: "Checking APS mailboxes"
      command: sleep 90; mkdir -p "${HOME}/.logs/mailbox-monitor"; ${HOME}/.dotfiles/bashrc/helpers/mailbox-monitor/run-mailbox-monitor.sh --env-file "${HOME}/.dotfiles/bashrc/helpers/mailbox-monitor/.env" >> "${HOME}/.logs/mailbox-monitor/$(date +\%Y\%m\%d-\%H\%M\%S).log" 2>&1
