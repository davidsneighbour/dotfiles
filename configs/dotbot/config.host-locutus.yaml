---
################################################################################
# Setup configuration for Dotbot
#
# @see https://github.com/anishathalye/dotbot for more info
################################################################################
- description: Main workstation dotfiles setup (links, tools, cronjobs, and host-specific configs).

- plugins:
    - modules/dotbot-plugins/crontab-dotbot/

- crontab:
    - cron: "*/2 * * * *"
      comment: load emails every 2 minutes
      command: ${HOME}/.dotfiles/bashrc/cronjobs/msgvault.sh

    - cron: "15 15 * * *"
      comment: "daily docker container backup"
      command:  |
        ${HOME}/.dotfiles/bashrc/cronjobs/docker-backup.sh --apply \
        --docker-path ${HOME}/.dotfiles/containers/locutus \
        --backup-path /mnt/storage/Backup/Docker/Locutus \
        --verbose \
        >> "${HOME}/.logs/cron/docker-backup.log" 2>&1

    - cron: "20 15 * * 0"
      comment: "weekly docker container backup to keep"
      command: |
        ${HOME}/.dotfiles/bashrc/cronjobs/docker-backup.sh --keep --apply \
        --docker-path ${HOME}/.dotfiles/containers/locutus \
        --backup-path /mnt/storage/Backup/Docker/Locutus \
        --keep-count 10 \
        --verbose \
        >> "${HOME}/.logs/cron/docker-backup.log" 2>&1
