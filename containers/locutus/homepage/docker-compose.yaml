---
services:
  homepage:
    # secretlint-disable-next-line @secretlint/secretlint-rule-secp256k1-privatekey
    image: ghcr.io/gethomepage/homepage:latest@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    container_name: homepage
    ports:
      - 3005:3000
    volumes:
      - ${CONFIG}:/app/config
      - ${DIR}/images:/app/public/images
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: "*"
