services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main-slim
    container_name: openwebui
    restart: unless-stopped

    ports:
      - "3000:8080"

    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

    volumes:
      - open-webui:/app/backend/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  open-webui:
