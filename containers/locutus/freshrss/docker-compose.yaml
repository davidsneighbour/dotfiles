---
services:
  freshrss:
    # secretlint-disable-next-line @secretlint/secretlint-rule-secp256k1-privatekey
    image: lscr.io/linuxserver/freshrss:latest@sha256:d97008a26ee3ed730bf5e85cdb92a4d369d12964e6439f3a5eaa3862092d3dcf
    container_name: freshrss
    volumes:
      - ./config:/config
      # secretlint-disable-next-line @secretlint/secretlint-rule-no-homedir
      - /home/patrick/github.com/davidsneighbour/freshrss-theme:/app/www/p/themes/freshrss-theme/
    ports:
      - 3050:80
    restart: unless-stopped

    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Bangkok
      CRON_MIN: '2,12,22,32,42,52'
      LISTEN: 0.0.0.0:80
      OIDC_ENABLED: 0

    healthcheck:
      test: ["CMD", "cli/health.php"]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3
